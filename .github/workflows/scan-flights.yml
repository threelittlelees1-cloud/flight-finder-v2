name: scan-flights

on:
  workflow_dispatch:
  schedule:
    - cron: "17,47 * * * *"

permissions:
  contents: write

concurrency:
  group: scan-flights
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Scan watched routes
        env:
          TRAVELPAYOUTS_API_TOKEN: ${{ secrets.TRAVELPAYOUTS_API_TOKEN }}
          TRAVELPAYOUTS_API_BASE_URL: https://api.travelpayouts.com
          TRAVELPAYOUTS_MARKET: us
        run: node scripts/scan-flights.mjs

      - name: Commit updated deals
        run: |
          if git diff --quiet -- data/latest_deals.json; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest_deals.json
          git commit -m "Update cached flight deals"
          git push
